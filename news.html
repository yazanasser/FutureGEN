  <script>
    (function () {
      if (window.location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', function () {
          var bar = document.createElement('div');
          bar.id = 'file-protocol-warning';
          bar.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:2147483647',
            'background:#c0392b', 'color:#fff', 'padding:14px 20px',
            'font:bold 14px/1.5 sans-serif', 'text-align:center',
            'box-shadow:0 2px 8px rgba(0,0,0,.4)'
          ].join(';');
          bar.innerHTML = [
            '⚠️ You are opening this file directly — links and navigation will not work.',
            ' To use FutureGen properly:<br>',
            '1. Double-click <strong>start.bat</strong> in the project folder &nbsp;|&nbsp;',
            '2. Then open <a href="http://localhost:3000" style="color:#ffe082;font-weight:bold;">',
            'http://localhost:3000</a> in your browser.'
          ].join('');
          var close = document.createElement('span');
          close.textContent = ' ×';
          close.style.cssText = 'cursor:pointer;margin-left:16px;font-size:18px;vertical-align:middle;';
          close.onclick = function () { bar.remove(); };
          bar.appendChild(close);
          document.body.insertBefore(bar, document.body.firstChild);
        });
        return;
      }

      var h = window.location.hostname;
      if (h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0') return;

      if (window.location.search.indexOf('u=') !== -1) {
        try {
          var cleanUrl = new URL(window.location.href);
          cleanUrl.searchParams.delete('u');
          window.history.replaceState(null, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
        } catch (e) {}
      }

      var _checking = false;
      var THROTTLE_MS = 15000;
      var POLL_MS = 60000;

      function fetchVersionByXHR(cb) {
        var buster = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        var url = '/version.json?_=' + buster;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.setRequestHeader('Cache-Control', 'no-cache, no-store, must-revalidate');
          xhr.setRequestHeader('Pragma', 'no-cache');
          xhr.setRequestHeader('Expires', '0');
          xhr.timeout = 8000;
          xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
              cb(null, xhr.responseText.trim());
            } else {
              cb(new Error('HTTP ' + xhr.status));
            }
          };
          xhr.onerror = xhr.ontimeout = function () { cb(new Error('network')); };
          xhr.send();
        } catch (e) {
          fetch(url, { method: 'GET', cache: 'no-store' })
            .then(function (r) { return r.ok ? r.text() : Promise.reject(r.status); })
            .then(function (t) { cb(null, t.trim()); })
            .catch(function (err) { cb(err); });
        }
      }

      function checkForUpdates(force) {
        if (_checking) return;
        var now = Date.now();
        if (!force) {
          var last = parseInt(sessionStorage.getItem('fg_lc') || '0', 10);
          if (now - last < THROTTLE_MS) return;
        }
        sessionStorage.setItem('fg_lc', now.toString());
        _checking = true;

        fetchVersionByXHR(function (err, fingerprint) {
          _checking = false;
          if (err || !fingerprint) return;

          var stored = localStorage.getItem('fg_sv');
          if (stored && stored !== fingerprint) {
            console.log('[FG-Updater] New version detected. Reloading…');
            localStorage.setItem('fg_sv', fingerprint);

            try {
              if ('caches' in window) {
                caches.keys().then(function (k) { k.forEach(function (n) { caches.delete(n); }); });
              }
            } catch (e) {}

            try {
              if (navigator.serviceWorker) {
                navigator.serviceWorker.getRegistrations().then(function (r) {
                  r.forEach(function (reg) { reg.unregister(); });
                });
              }
            } catch (e) {}

            setTimeout(function () {
              var reloadUrl = new URL(window.location.href);
              reloadUrl.searchParams.set('u', now.toString());
              window.location.replace(reloadUrl.toString());
            }, 150);
          } else {
            localStorage.setItem('fg_sv', fingerprint);
          }
        });
      }

      if (document.readyState === 'complete') {
        checkForUpdates(false);
      } else {
        window.addEventListener('load', function () { checkForUpdates(false); });
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') checkForUpdates(false);
      });

      window.addEventListener('pageshow', function (e) {
        if (e.persisted) checkForUpdates(true);
      });

      window.addEventListener('focus', function () { checkForUpdates(false); });

      setInterval(function () { checkForUpdates(false); }, POLL_MS);

    }());
  </script>
